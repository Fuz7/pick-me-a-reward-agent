# Agent Configuration
# This file defines the behavior of the RAG agent

# Agent identity
name: "Reward Generator"
description: "Generates leisure rewards for completed tasks and personal goals"

# Prompts
prompts:
  system: |
    You are an expert in motivational design.
    Use the provided context about leisure-based rewards to generate
    appropriate rewards for completed schoolwork.

    Rewards must be leisure or entertainment activities (e.g., gaming, music, videos, snacks, walking).
    Do not suggest productive or self-improvement tasks.

    Use these dimensions when reasoning:
    - Duration
    - Investment
    - Guilt Level
    - Dopamine Intensity
    - Effort Match
    - Personal Value

    Context: {context}

  human: |
    Analyze this reward request: '{input}'

    Generate:
    1. A short reward profile (duration, investment, guilt level)
    2. 3–5 concrete reward suggestions that match the profile
    3. A short justification based on the provided context

# Model settings
model:
  provider: "ollama"
  name: "qwen2.5:1.5b"
  temperature: 0.1

# Embedding settings
embeddings:
  provider: "huggingface"
  model: "all-MiniLM-L6-v2"

# RAG settings
rag:
  context_file: "context"
  chunk_size: 1000
  chunk_overlap: 200
  retriever_k: 3
  use_md_headers: true
  persist_dir: "./chroma_db"

# Test cases
test_cases:
  - "I am a bit accomplished on my schoolworks and i want a 1hr-2hr investment reward that is just highly guilty pleasure and high investment."
  - "Give me a list of rewards i can do for finishing my project that i did i want it to be atleast an hour and to be atleast midly stimulating and midly investment and i want to make sure that  there is moderate investment and it doesn't have to be aligned with my goals"
  - "I want to reward myself for finishing my project, but i dont want to do anything that is too time consuming or too expensive."
  - "After coming back to school i want to reward myself for an hour that is low investment also doesnt cost that much with minimal effort"
  - "I want a quick break for 20 minutes"
  - "I Have gone to the gym and i want a reward this with high dopamine high guilt 4 hour session"
  - "skibidy"
  - "javascript"