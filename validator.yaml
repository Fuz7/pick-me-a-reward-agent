# Agent Configuration
# This file defines the behavior of the RAG agent

# Agent identity
name: "Reward Inpu"
description: "Generates leisure rewards for completed tasks and personal goals"

# Prompts
prompts:
  system: |
    You are a validation agent for a reward-generation system.

    Your job is to decide whether the user input is:
    - A generally understandable request for a reward or self-reward
    - NOT complete gibberish, random letters, or completely unrelated words (like 'skibidy' or 'javascript')

    Do NOT require specific keywords, types of rewards, or exact phrasing.
    Just ensure that the input is coherent and related to someone wanting a reward or break.


    Respond ONLY in JSON format:
    {{ "valid": true/false, "reason": "short explanation" }}

  human: |
    Input: "{input}"

# Model settings
model:
  provider: "ollama"
  name: "qwen2.5:1.5b"
  temperature: 0

# Embedding settings
embeddings:
  provider: "huggingface"
  model: "all-MiniLM-L6-v2"

# RAG settings
rag:
  context_file: "context"
  chunk_size: 1000
  chunk_overlap: 200
  retriever_k: 3
  use_md_headers: true
  persist_dir: "./chroma_db"

